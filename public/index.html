<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Expertise Sharing</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>

<body>
  <div class="mainCont">

    <div class="topDesc">
      <div class="appTitle">Expertise <span class="titleAccent">Sharing</span></div>
      <div class="appSubtitle">Connect as an expert or novice to share a live 3D view in real time.</div>
    </div>

    <div class="btnCont">
      <div class="selectUser">
        <button id="expert" class="roleCard">
          <div class="cardInner">
            <div class="roleTitle">Join as Expert</div>
            <div class="roleDesc">Control the model and guide the session.</div>
          </div>
        </button>

        <button id="novice" class="roleCard">
          <div class="cardInner">
            <div class="roleTitle">Join as Novice</div>
            <div class="roleDesc">Follow along and observe changes in real time.</div>
          </div>
        </button>
      </div>

      <!-- <textarea id="input" placeholder="Expert types here"></textarea>
    <pre id="mirror"></pre> -->


      <!-- AI Built -->
      <svg class="cadAccent" viewBox="0 0 120 120" aria-hidden="true">

        <g class="shape s1" fill="none" stroke="#1B263B" stroke-width="1.4" stroke-linejoin="round">
          <rect x="44" y="44" width="36" height="36" />
          <rect x="34" y="34" width="36" height="36" />
          <line x1="34" y1="34" x2="44" y2="44" />
          <line x1="70" y1="34" x2="80" y2="44" />
          <line x1="34" y1="70" x2="44" y2="80" />
          <line x1="70" y1="70" x2="80" y2="80" />
        </g>


        <g class="shape s2" fill="none" stroke="#1B263B" stroke-width="1.4" stroke-linecap="round"
          stroke-linejoin="round">
          <circle cx="60" cy="60" r="2" fill="#1B263B" opacity="0.7"></circle>
          <line x1="60" y1="60" x2="92" y2="48" />
          <line x1="92" y1="48" x2="86" y2="47" />
          <line x1="92" y1="48" x2="89" y2="54" />
          <line x1="60" y1="60" x2="44" y2="88" />
          <line x1="44" y1="88" x2="45" y2="81" />
          <line x1="44" y1="88" x2="51" y2="86" />
          <line x1="60" y1="60" x2="60" y2="26" />
          <line x1="60" y1="26" x2="56" y2="32" />
          <line x1="60" y1="26" x2="64" y2="32" />
        </g>


        <g class="shape s3" fill="none" stroke="#1B263B" stroke-width="1.4" stroke-linejoin="round">
          <ellipse cx="60" cy="35" rx="26" ry="10" />
          <ellipse cx="60" cy="85" rx="26" ry="10" />
          <line x1="34" y1="35" x2="34" y2="85" />
          <line x1="86" y1="35" x2="86" y2="85" />
        </g>

        <g class="shape s4" fill="none" stroke="#1B263B" stroke-width="1.4" stroke-linejoin="round">
          <circle cx="60" cy="60" r="28" />
          <ellipse cx="60" cy="60" rx="28" ry="12" />
          <ellipse cx="60" cy="60" rx="12" ry="28" />
          <path d="M32 60 C42 46, 78 46, 88 60" />
          <path d="M32 60 C42 74, 78 74, 88 60" />
        </g>

      </svg>
    </div>

  </div>

  <!-- Code generated by ChatGPT - Start -->
  <div id="sessionOverlay" class="overlay hidden" aria-hidden="true">
    <div class="overlayInner">
  
      <!-- EXPERT VIEW -->
      <div id="expertView" class="view hidden">
        <div class="expertHud">
          <div class="camPanel">
            <div class="camStage">
              <video id="webcam" autoplay playsinline></video>
              <canvas id="output_canvas"></canvas>
            </div>
            <div class="camDivider">
              <pre id="expert_debug" class="mono">Loading…</pre>
            </div>
          </div>
  
          <div class="objectPanel">
            <canvas id="scene_canvas"></canvas>
          </div>
        </div>
  
        <div class="overlayActions">
          <button id="endSession" class="btn secondary">End</button>
          <button id="webcamButton" class="btn">Enable Webcam</button>
        </div>
      </div>
  
      <!-- NOVICE VIEW -->
      <div id="noviceView" class="view hidden">
        <div class="noviceHud">
          <div class="objectPanel">
            <canvas id="scene_canvas_novice"></canvas>
          </div>
  
          <div class="noviceReadout">
            <pre id="novice_readout" class="mono">Waiting for expert…</pre>
          </div>
        </div>
  
        <div class="overlayActions">
          <button id="endSession_novice" class="btn secondary">Leave</button>
        </div>
      </div>
  
    </div>
  </div>
  <!-- Code generated by ChatGPT - End -->

  <script src="app.js"></script>
  <script type="module" src="expert.js"></script>
</body>

</html>
